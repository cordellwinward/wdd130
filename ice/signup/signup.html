<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }

        #formContainer{
            width: 700px;
            border: 10px solid darkblue;
            border-radius: 5px;
            margin: auto;
            margin-top: 50px;
            margin-bottom: 50px;
            background-color: white;

        }
        #banner{
            width: 700px;
            height: 250px;
            background-image: url("images/jesus_feeds_5000.jpeg");
            background-size: 700px;
            background-position-y: -50px;
            text-align: center;
            color: white;
            display: flex;
            align-items: center;
            justify-content:end;
            flex-direction: column;
            line-height: 2;
            padding: 40px;
            box-sizing: border-box;
        }
        h3{
            text-align: center;
            margin: 20px;
        }
        form{
            display: grid;
            grid-template-columns: 1fr 1fr;
            margin: auto;
            width: 500px;
        }
        form label{
            grid-column: 1/2;
            line-height: 1.2;
        }
        form input{
            grid-column: 2/3;
            margin: 2px;
        }
        #closeBtn{
            position: absolute;
            top: 70px;
        }

        #scriptures{
            display:grid;
            grid-template-columns: repeat(5, 1fr);
            width: 100%;
        }

        .scriptures-img{
            width: 100%;
        }
    </style>




</head>

    <body>
        <div id="formContainer">
            <div id = "banner">
                <h1>Daily Feed</h1>
                <h2>Scripture a Day</h2>
            </div>
            <h3>Sign Up for Daily Scripture Feed</h3>
            <form id="myForm">
                <button type="button" id="closeBtn">X</button>
                <label for="username">User Name:</label>
                <input type="text" id="username" name="username" required>
    
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
    
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
    
                <label>Gender:</label>
                <div>
                    <input type="radio" id="male" name="gender" value="male" required>
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female" required>
                    <label for="female">Female</label>
                </div>
    
                <section>
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Subscribe to newsletter</label>
                </section>
    
                <section>
                    <input type="checkbox" id="conditions" name="conditions" required>
                    <label for="conditions">I acknowledge the terms and conditions</label>
                </section>
    
                <section>
                    <button type="submit">Submit</button>
                </section>
            </form>
            <div id = "scriptures">
                <img class = "scripture-img" src="images/old_testament.webp" alt="Old Testament">
                <img class = "scripture-img" src="images/new_testament.webp" alt="New Testament">
                <img class = "scripture-img" src="images/book_of_mormon.webp" alt="Book of Mormon">
                <img class = "scripture-img" src="images/doctrine_and_covenants.webp" alt="Doctrine and Covenants">
                <img class = "scripture-img" src="images/pearl_of_great_price.webp" alt ="Pearl of Great Price">
            </div>
        </div>
        

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
